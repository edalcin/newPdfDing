{% load i18n %}
{# ponytail: tagPicker JS defined once in base.html, not repeated here #}
<div x-data="tagPicker([{% for tag in request.user.profile.tags %}'{{ tag.name }}',{% endfor %}], '{{ current_value }}')"
     class="relative">
  <div class="flex flex-wrap gap-1 mb-1">
    <template x-for="tag in selectedTags" :key="tag">
      <span class="flex items-center gap-1 px-2 py-0.5 rounded-full text-sm bg-primary/20 text-primary">
        <span x-text="tag"></span>
        <button type="button" @click="removeTag(tag)" class="hover:text-red-500">&times;</button>
      </span>
    </template>
  </div>
  <input type="text"
         x-model="inputValue"
         @input="filterSuggestions"
         @keydown.space.prevent="addTagFromInput"
         @keydown.enter.prevent="addTagFromInput"
         placeholder="{% trans 'Add Tags' %}"
         class="form-control"
         autocomplete="off">
  <input type="hidden" name="tag_string" :value="selectedTags.join(' ')">
  <div x-show="suggestions.length > 0" x-cloak
       class="absolute z-10 w-full mt-1 bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-sm shadow-md max-h-40 overflow-auto">
    <template x-for="s in suggestions" :key="s">
      <div @click="addTag(s)"
           class="px-3 py-1.5 cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700 text-sm"
           x-text="s">
      </div>
    </template>
  </div>
  <span class="helptext text-xs text-slate-500">
    {% trans 'Optional. Select existing tags or type new ones (space/enter to add).' %}
  </span>
</div>
