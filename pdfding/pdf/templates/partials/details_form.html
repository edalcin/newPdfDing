{% load i18n %}
<form action="{{ action_url }}"
      method="post"
      {% if field_name != "description" and field_name != "notes" and field_name != "tags" %}
      class="flex gap-2 text-black dark:text-slate-200 h-8 w-11/12 my-1 ml-1
             [&>select]:bg-white dark:[&>select]:bg-slate-700
             [&>input]:bg-slate-200! dark:[&>input]:bg-slate-700!"
      {% else %}
      class="flex gap-y-1 flex-col mt-1 text-black dark:text-slate-200 [&>textarea]:text-sm"
      {% endif %}
      autocomplete="off">
    {% csrf_token %}
    {% if field_name == 'tags' %}
    {% include 'includes/tag_input.html' with current_value=form.tag_string.value|default:'' %}
    {% else %}
    {% for field in form %}{{ field }}{% endfor %}
    {% endif %}
    <button class="flex! items-center justify-center h-8 w-18" type="submit">{% trans 'Submit' %}</button>
</form>

<a hx-swap-oob="true" id="{{ edit_id }}" @click="location.reload()"
   class="font-medium text-primary hover:text-secondary cursor-pointer">
  {% trans 'Cancel' %}
</a>
