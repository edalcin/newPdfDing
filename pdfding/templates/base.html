{% load static %}
<!DOCTYPE html>
{% if not request.user.is_authenticated %}
<html data-theme="{{ DEFAULT_THEME_COLOR }}" lang="en">
{% else %}
<html data-theme="{{ request.user.profile.theme_color }}" lang="en">
{% endif %}
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PdfDing</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="{% static 'css/boxicons.css' %}" rel="stylesheet">
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo_with_circle.svg' %}">
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        {% if not request.user.is_authenticated %}
        var theme = stored || '{{ DEFAULT_THEME }}';
        {% else %}
        var theme = stored || '{{ request.user.profile.dark_mode_str }}';
        {% endif %}

        if (theme === 'system') {
          var isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.add(isSystemDark ? 'dark' : 'light');
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            document.documentElement.classList.toggle('dark', e.matches);
            document.documentElement.classList.toggle('light', !e.matches);
          });
        } else {
          document.documentElement.classList.add(theme);
        }
      })();
    </script>
    <script src="{% static 'js/alpine.min.js' %}" defer></script>
    <script src="{% static 'js/htmx.min.js' %}" defer></script>
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
    {% if request.user.profile.theme_color == 'Custom' %}
    <style>
        html[data-theme="Custom"] {
          --color-primary: {{ request.user.profile.custom_theme_color }};
          --color-secondary: {{ request.user.profile.custom_theme_color_secondary }};
        }
    </style>
    {% endif %}
    <script>
    function tagPicker(allTags, initialValue) {
      return {
        allTags: allTags || [],
        selectedTags: initialValue ? initialValue.trim().split(/\s+/).filter(Boolean) : [],
        inputValue: '',
        suggestions: [],
        filterSuggestions() {
          var q = this.inputValue.toLowerCase();
          if (!q) { this.suggestions = []; return; }
          this.suggestions = this.allTags.filter(function(t) {
            return t.toLowerCase().includes(q) && !this.selectedTags.includes(t);
          }.bind(this));
        },
        addTag(tag) {
          if (!this.selectedTags.includes(tag)) this.selectedTags.push(tag);
          this.inputValue = '';
          this.suggestions = [];
        },
        addTagFromInput() {
          var t = this.inputValue.trim();
          if (t) this.addTag(t);
        },
        removeTag(tag) {
          this.selectedTags = this.selectedTags.filter(function(t) { return t !== tag; });
        }
      };
    }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js');
      }
    </script>
</head>
<body class="flex flex-col bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200"
      x-data="{ show_bulk_edit_menu: false }">
    {# fix FOUC for firefox #}
    <script>0</script>
    {% include 'includes/header.html' %}

    <div class="h-full">
        {% include 'includes/messages.html' %}

        {% block layout %}
        {% endblock %}
    </div>
</body>
</html>
